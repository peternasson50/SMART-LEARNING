<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Learning</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <h1 class="title">Smart Learning Platform</h1>
    <nav class="nav">
      <button class="nav-link" onclick="showSection('home')">Home</button>
      <button class="nav-link" onclick="showSection('auth')">Auth</button>
      <button class="nav-link" onclick="showSection('courses')">Courses</button>
      <button class="nav-link" onclick="showSection('quiz')">Quiz</button>
    </nav>
  </header>

  <main class="main">
    <!-- Home Section -->
    <section id="home" class="section active">
      <h2 class="subtitle">Welcome to Smart Learning</h2>
      <p class="description">Choose a section from the navigation above.</p>
    </section>

    <!-- Auth Section -->
    <section id="auth" class="section">
      <h2 class="subtitle">Login</h2>
      <form id="loginForm" class="form">
        <label class="label">Email:</label>
        <input type="email" id="email" class="input" required>
        <label class="label">Password:</label>
        <input type="password" id="password" class="input" required>
        <button type="submit" class="btn">Login</button>
      </form>
    </section>

    <!-- Courses Section -->
    <section id="courses" class="section">
      <h2 class="subtitle">Available Courses</h2>
      <ul id="courseList" class="list"></ul>
    </section>

    <!-- Quiz Section -->
    <section id="quiz" class="section">
      <h2 class="subtitle">Quick Quiz</h2>
      <p class="question">What is 2 + 2?</p>
      <div class="quiz-options">
        <button class="btn" onclick="checkAnswer(3)">3</button>
        <button class="btn" onclick="checkAnswer(4)">4</button>
        <button class="btn" onclick="checkAnswer(5)">5</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Smart Learning</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
